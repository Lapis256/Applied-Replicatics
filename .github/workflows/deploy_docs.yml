name: Deploy Documentation
run-name: Deploy documentation for ${{ github.event.release.tag_name }}

permissions:
  contents: write

on:
  release:
    types:
      - published
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          path: documentation
          ref: docs

      - name: Setup common environment
        uses: ./.github/actions/setup-common-env

      - name: Generate documentation
        run: ./gradlew dokkaGenerateHtml

      - name: Deploy documentation
        run: |
          cd documentation
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Update documentation for ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push origin HEAD:docs
