name: Publish
run-name: Publish for ${{ github.event.release.tag_name }}

permissions:
  contents: write

on:
  release:
    types:
      - published

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.event.release.tag_name }}" --dir dist
          ls -la dist

      - name: Publish
        env:
          CHANGELOG: ${{ github.event.release.body }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
#          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
#          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
#        run: ./gradlew -Dorg.gradle.s3.endpoint=${{ secrets.R2_ENDPOINT }} curseforge publish
        run: ./gradlew publishMods -PreleaseFilesDir=dist

  deploy_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          path: documentation
          ref: docs

      - name: Setup common environment
        uses: ./.github/actions/setup-common-env

      - name: Generate documentation
        run: ./gradlew dokkaGenerateHtml

      - name: Deploy documentation
        run: |
          cd documentation
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Update documentation for ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push origin HEAD:docs
